name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install flake8
        run: pip install flake8
      - name: Lint (critical errors only)
        run: flake8 . --select=E9,F63,F7,F82 --show-source --statistics
